services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: personal-site-open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    env_file:
      - .env
    environment:
      WEBUI_URL: ${WEBUI_URL:-http://127.0.0.1:3000}
      WEBUI_NAME: ${WEBUI_NAME:-小羊 AI 对话小屋}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:?Set WEBUI_SECRET_KEY in .env}
      ENABLE_SIGNUP: ${ENABLE_SIGNUP:-false}
      ENABLE_OPENAI_API: ${ENABLE_OPENAI_API:-true}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_BASE_URLS: ${OPENAI_API_BASE_URLS:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_KEYS: ${OPENAI_API_KEYS:-}
      DEFAULT_MODELS: ${DEFAULT_MODELS:-}
      RAG_OPENAI_API_BASE_URL: ${RAG_OPENAI_API_BASE_URL:-https://api.openai.com/v1}
      RAG_OPENAI_API_KEY: ${RAG_OPENAI_API_KEY:-}
      RAG_EMBEDDING_ENGINE: ${RAG_EMBEDDING_ENGINE:-openai}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-text-embedding-3-small}
      RAG_EMBEDDING_MODEL_AUTO_UPDATE: ${RAG_EMBEDDING_MODEL_AUTO_UPDATE:-false}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui-data:/app/backend/data

volumes:
  open-webui-data:
