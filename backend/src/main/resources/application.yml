server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: personal-site
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 32MB

app:
  auth:
    token-secret: ${APP_TOKEN_SECRET:dev-personal-site-secret-change-me}
    token-ttl-hours: ${APP_TOKEN_TTL_HOURS:168}
  admin:
    username: ${APP_ADMIN_USERNAME:admin}
    password: ${APP_ADMIN_PASSWORD:change-this-admin-password}
    nickname: ${APP_ADMIN_NICKNAME:admin}
  upload:
    location: ${APP_UPLOAD_DIR:uploads}
